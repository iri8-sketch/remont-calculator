<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор ремонта — смета онлайн</title>
  <meta name="description" content="Рассчитайте стоимость ремонта квартиры по ценам Алматы и Астаны. Детальная смета по этапам." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="app"></div>

<script>
// ─── ДАННЫЕ: ЦЕНЫ ────────────────────────────────────────────────────────────

const BASE_STAGES = [
  { n: 1, name: "Демонтаж" },
  { n: 2, name: "Черновые работы" },
  { n: 3, name: "Электрика" },
  { n: 4, name: "Сантехника" },
  { n: 5, name: "Выравнивание стен и потолков" },
  { n: 6, name: "Укладка плитки" },
  { n: 7, name: "Чистовая отделка" },
  { n: 8, name: "Двери, окна, финальная отделка" },
]

// [workMin, workMax, matMin, matMax] — тг/м²
const PRICES = {
  cosmetic:  [[800,1500,0,500],[0,0,0,0],[1000,2000,500,1500],[500,1000,300,1000],[1500,3000,800,1500],[2000,4000,3000,8000],[2500,5000,2000,5000],[500,1500,1000,5000]],
  standard:  [[1000,2500,0,500],[3000,6000,2000,5000],[2000,4000,1500,3000],[1500,3000,2000,5000],[2500,5000,1500,3000],[3000,6000,5000,12000],[3500,7000,3000,8000],[1000,3000,3000,10000]],
  capital:   [[1500,3000,0,500],[5000,10000,4000,8000],[3000,6000,2500,5000],[2500,5000,3000,8000],[4000,8000,2500,5000],[5000,10000,8000,20000],[5000,10000,5000,12000],[2000,5000,5000,15000]],
  premium:   [[2000,5000,0,1000],[8000,15000,6000,12000],[6000,12000,5000,12000],[5000,10000,8000,25000],[7000,14000,4000,8000],[8000,16000,15000,40000],[8000,16000,10000,25000],[4000,8000,10000,30000]],
}

const REGION_MULT = { almaty: 1.0, astana: 0.95, other: 0.80 }
const HOUSE_MULT  = { new_rough: 1.0, new_fine: 0.7, khrushchevka: 1.3, panel: 1.2, monolith: 1.05, private: 1.15 }

function calculate(p) {
  const mult = REGION_MULT[p.region] * HOUSE_MULT[p.houseType]
  const raw = PRICES[p.renovationType]

  const stages = BASE_STAGES.map((s, i) => {
    // пропуски
    if (p.houseType === 'new_fine' && (s.n === 1 || s.n === 2)) return null
    if (p.renovationType === 'cosmetic' && s.n === 2) return null
    const [wMin, wMax, mMin, mMax] = raw[i].map(v => Math.round(v * mult))
    return {
      n: s.n, name: s.name,
      workMin: Math.round(wMin * p.area),
      workMax: Math.round(wMax * p.area),
      matMin:  Math.round(mMin * p.area),
      matMax:  Math.round(mMax * p.area),
    }
  }).filter(Boolean)

  const totWork = [stages.reduce((s,x)=>s+x.workMin,0), stages.reduce((s,x)=>s+x.workMax,0)]
  const totMat  = [stages.reduce((s,x)=>s+x.matMin,0),  stages.reduce((s,x)=>s+x.matMax,0)]
  const total   = [totWork[0]+totMat[0], totWork[1]+totMat[1]]
  const reserve = [Math.round(total[0]*0.10), Math.round(total[1]*0.15)]
  const grand   = [total[0]+reserve[0], total[1]+reserve[1]]

  return { stages, totWork, totMat, total, reserve, grand }
}

function fmt(n) {
  return new Intl.NumberFormat('ru-KZ',{maximumFractionDigits:0}).format(n) + ' ₸'
}

// ─── СОВЕТЫ ──────────────────────────────────────────────────────────────────

const TIPS = {
  cosmetic:  { diy:["Покраска стен и потолков","Поклейка обоев","Укладка ламината"], noSave:["Электрика — безопасность важнее экономии"], rookie:["Покупать обои с запасом менее 15%","Не готовить стены перед покраской"] },
  standard:  { diy:["Покраска стен","Сборка мебели","Монтаж карнизов"], noSave:["Электрика и щиток","Гидроизоляция в ванной"], rookie:["Экономить на затирке — трескается","Не делать схему электрики заранее"] },
  capital:   { diy:["Финальная уборка","Сборка мебели","Мелкий декор"], noSave:["Электрика","Сантехника — плохие трубы = потоп","Гидроизоляция"], rookie:["Начинать чистовую до высыхания стяжки (21+ дней)","Не проверять уровень пола перед плиткой"] },
  premium:   { diy:["Авторский надзор — можно делегировать"], noSave:["Всё скрытое: электрика, трубы, изоляция","Гидроизоляция ванной и кухни"], rookie:["Согласовывать перепланировку задним числом","Заказывать материалы без запаса на бой (10–15%)"] },
}

// ─── СОСТОЯНИЕ ───────────────────────────────────────────────────────────────

let state = {
  screen: 'landing', // landing | form | result
  step: 0,
  form: { houseType:'', area:'', rooms:'2', bathroomType:'combined', renovationType:'', region:'', budget:'' },
  estimate: null,
  error: '',
}

function setState(patch) {
  Object.assign(state, patch)
  render()
}

// ─── РЕНДЕР ──────────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById('app')
  if (state.screen === 'landing') app.innerHTML = renderLanding()
  else if (state.screen === 'form') app.innerHTML = renderForm()
  else if (state.screen === 'result') app.innerHTML = renderResult()
  attachEvents()
}

// ─── ЛЕНДИНГ ─────────────────────────────────────────────────────────────────

function renderLanding() {
  return `
  <main class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50">
    <div class="max-w-4xl mx-auto px-4 py-16 fade-in">
      <div class="text-center mb-16">
        <div class="inline-block bg-blue-100 text-blue-700 text-sm font-medium px-4 py-1.5 rounded-full mb-6">Бесплатный калькулятор ремонта</div>
        <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight">
          Узнайте стоимость ремонта<br><span class="text-blue-600">за 2 минуты</span>
        </h1>
        <p class="text-xl text-gray-500 mb-10 max-w-2xl mx-auto">
          Введите параметры квартиры — получите детальную смету с разбивкой по этапам и финансовым календарём. По ценам Алматы и Астаны.
        </p>
        <button onclick="gotoForm()" class="bg-blue-600 text-white text-lg font-semibold px-10 py-4 rounded-2xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
          Рассчитать смету →
        </button>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
        ${[['📊','Детальная смета','Разбивка по 8 этапам: работы и материалы отдельно'],
           ['📅','Финансовый график','Когда и сколько денег нужно по месяцам'],
           ['📄','PDF для мастера','Распечатайте смету и покажите мастеру для сравнения цен']
          ].map(([icon,title,desc])=>`
          <div class="bg-white rounded-2xl p-6 border border-gray-100 shadow-sm">
            <div class="text-3xl mb-3">${icon}</div>
            <h3 class="font-semibold text-gray-900 mb-1">${title}</h3>
            <p class="text-sm text-gray-500">${desc}</p>
          </div>`).join('')}
      </div>
      <div class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Как это работает</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          ${[['1','Укажите тип дома'],['2','Введите площадь'],['3','Выберите тип ремонта'],['4','Получите смету']]
            .map(([n,t])=>`<div class="text-center"><div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-3">${n}</div><p class="text-sm text-gray-600">${t}</p></div>`).join('')}
        </div>
      </div>
      <p class="text-center text-xs text-gray-400 mt-10">Цены актуальны на июнь 2026 г. Смета носит ориентировочный характер.</p>
    </div>
  </main>`
}

// ─── ФОРМА ───────────────────────────────────────────────────────────────────

const HOUSE_OPTS = [
  {v:'new_rough',    l:'Новостройка черновая',  d:'Голые стены, нет стяжки и штукатурки'},
  {v:'new_fine',     l:'Новостройка чистовая',  d:'Стяжка, штукатурка уже сделаны'},
  {v:'khrushchevka', l:'Хрущёвка',              d:'Старый фонд, нужен капитальный ремонт'},
  {v:'panel',        l:'Панельный дом',          d:'Типовая планировка, панельные стены'},
  {v:'monolith',     l:'Монолит',                d:'Современный монолитный дом'},
  {v:'private',      l:'Частный дом',            d:'Отдельностоящий дом'},
]
const RENO_OPTS = [
  {v:'cosmetic', l:'Косметический', d:'Обои, покраска, замена напольного покрытия',  c:'green'},
  {v:'standard', l:'Стандартный',   d:'Полная отделка без перепланировки',            c:'blue'},
  {v:'capital',  l:'Капитальный',   d:'Перепланировка, замена всех коммуникаций',     c:'orange'},
  {v:'premium',  l:'Премиум',       d:'Дизайнерский ремонт под ключ',                 c:'purple'},
]
const REGION_OPTS = [{v:'almaty',l:'Алматы'},{v:'astana',l:'Астана'},{v:'other',l:'Другой город'}]
const STEPS = ['Тип жилья','Параметры','Тип ремонта','Регион']

function renderForm() {
  const s = state.step
  const f = state.form
  const progress = STEPS.map((label,i)=>`
    <div class="flex items-center gap-1.5 flex-1 ${i<STEPS.length-1?'':''}">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold shrink-0
        ${i<s?'bg-blue-600 text-white':i===s?'bg-blue-600 text-white ring-4 ring-blue-100':'bg-gray-100 text-gray-400'}">
        ${i<s?'✓':i+1}
      </div>
      ${i<STEPS.length-1?`<div class="h-1 flex-1 rounded ${i<s?'bg-blue-600':'bg-gray-100'}"></div>`:''}
    </div>`).join('')

  let body = ''
  if (s === 0) {
    body = HOUSE_OPTS.map(h=>`
      <button onclick="setField('houseType','${h.v}')" class="text-left p-4 rounded-xl border-2 transition-all w-full
        ${f.houseType===h.v?'border-blue-500 bg-blue-50':'border-gray-100 hover:border-blue-200'}">
        <div class="font-medium text-gray-900">${h.l}</div>
        <div class="text-sm text-gray-500 mt-0.5">${h.d}</div>
      </button>`).join('')
  } else if (s === 1) {
    body = `
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Общая площадь (м²)</label>
          <input type="number" min="10" max="1000" placeholder="50" value="${f.area}"
            oninput="setField('area',this.value)"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Количество комнат</label>
          <div class="flex gap-2">
            ${['1','2','3','4+'].map(r=>`
              <button onclick="setField('rooms','${r==='4+'?'4':r}')"
                class="flex-1 py-3 rounded-xl border-2 font-semibold transition-all
                  ${f.rooms===(r==='4+'?'4':r)?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-100 text-gray-600 hover:border-blue-200'}">
                ${r}
              </button>`).join('')}
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Санузел</label>
          <div class="flex gap-2">
            ${[['combined','Совмещённый'],['separate','Раздельный']].map(([v,l])=>`
              <button onclick="setField('bathroomType','${v}')"
                class="flex-1 py-3 rounded-xl border-2 font-medium text-sm transition-all
                  ${f.bathroomType===v?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-100 text-gray-600 hover:border-blue-200'}">
                ${l}
              </button>`).join('')}
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Бюджет (необязательно)</label>
          <input type="number" placeholder="Например: 5 000 000" value="${f.budget}"
            oninput="setField('budget',this.value)"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p class="text-xs text-gray-400 mt-1">Укажите, если хотите подобрать оптимальный сценарий</p>
        </div>
      </div>`
  } else if (s === 2) {
    body = RENO_OPTS.map(r=>`
      <button onclick="setField('renovationType','${r.v}')" class="text-left p-4 rounded-xl border-2 transition-all w-full
        ${f.renovationType===r.v?`border-blue-500 bg-${r.c}-50`:'border-gray-100 hover:border-blue-200'}">
        <div class="font-semibold text-gray-900">${r.l}</div>
        <div class="text-sm text-gray-600 mt-0.5">${r.d}</div>
      </button>`).join('')
  } else if (s === 3) {
    body = REGION_OPTS.map(r=>`
      <button onclick="setField('region','${r.v}')" class="w-full py-4 rounded-xl border-2 font-medium transition-all
        ${f.region===r.v?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-100 text-gray-700 hover:border-blue-200'}">
        ${r.l}
      </button>`).join('')
  }

  return `
  <main class="min-h-screen bg-gray-50 py-12 px-4">
    <div class="max-w-xl mx-auto fade-in">
      <div class="mb-8">
        <button onclick="gotoLanding()" class="text-sm text-gray-400 hover:text-gray-600 transition-colors no-print">← На главную</button>
        <h1 class="text-2xl font-bold text-gray-900 mt-4">Калькулятор ремонта</h1>
        <p class="text-gray-500 mt-1">Ответьте на 4 вопроса — получите смету</p>
      </div>
      <div class="flex items-center gap-2 mb-8">${progress}</div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-xl font-semibold text-gray-900 mb-1">${STEPS[s]}</h2>
        <p class="text-sm text-gray-500 mb-6">Шаг ${s+1} из ${STEPS.length}</p>
        <div class="grid grid-cols-1 gap-3">${body}</div>
        ${state.error?`<p class="text-red-500 text-sm mt-4">${state.error}</p>`:''}
        <div class="flex gap-3 mt-6">
          ${s>0?`<button onclick="prevStep()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 transition-colors">Назад</button>`:''}
          <button onclick="nextStep()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition-colors">
            ${s===STEPS.length-1?'Рассчитать смету →':'Далее'}
          </button>
        </div>
      </div>
    </div>
  </main>`
}

// ─── РЕЗУЛЬТАТ ───────────────────────────────────────────────────────────────

function renderResult() {
  const e = state.estimate
  const f = state.form
  const tips = TIPS[f.renovationType]

  const houseLabel = {new_rough:'Новостройка черновая',new_fine:'Новостройка чистовая',khrushchevka:'Хрущёвка',panel:'Панельный дом',monolith:'Монолит',private:'Частный дом'}[f.houseType]
  const renoLabel  = {cosmetic:'Косметический',standard:'Стандартный',capital:'Капитальный',premium:'Премиум'}[f.renovationType]
  const regLabel   = {almaty:'Алматы',astana:'Астана',other:'Другой город'}[f.region]

  const stagesHtml = e.stages.map(s=>`
    <tr class="border-b border-gray-50 hover:bg-gray-50">
      <td class="px-4 py-3 text-gray-400 font-mono text-sm">${s.n}</td>
      <td class="px-4 py-3 font-medium text-gray-900 text-sm">${s.name}</td>
      <td class="px-4 py-3 text-right text-gray-600 text-sm whitespace-nowrap">${fmt(s.workMin)} — ${fmt(s.workMax)}</td>
      <td class="px-4 py-3 text-right text-gray-600 text-sm whitespace-nowrap">${s.matMin>0?`${fmt(s.matMin)} — ${fmt(s.matMax)}`:'—'}</td>
    </tr>`).join('')

  const tipCard = (icon, title, items, bg, text) => `
    <div class="rounded-xl border p-4 ${bg}">
      <div class="text-2xl mb-2">${icon}</div>
      <h4 class="font-semibold text-sm mb-3 ${text}">${title}</h4>
      <ul class="space-y-1.5">${items.map(i=>`<li class="text-sm text-gray-700 flex gap-2"><span class="shrink-0">•</span><span>${i}</span></li>`).join('')}</ul>
    </div>`

  return `
  <main class="min-h-screen bg-gray-50 py-10 px-4 print:bg-white print:py-4">
    <div class="max-w-3xl mx-auto fade-in">

      <div class="flex items-start justify-between mb-8 no-print">
        <div>
          <button onclick="gotoForm()" class="text-sm text-gray-400 hover:text-gray-600">← Изменить параметры</button>
          <h1 class="text-2xl font-bold text-gray-900 mt-3">Ваша смета на ремонт</h1>
          <p class="text-gray-500 text-sm mt-1">${houseLabel} · ${f.area} м² · ${f.rooms} комн. · ${renoLabel} · ${regLabel}</p>
        </div>
        <button onclick="window.print()" class="hidden md:flex items-center gap-2 bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-xl hover:bg-gray-50 text-sm font-medium">
          📄 Распечатать
        </button>
      </div>

      <!-- Итого -->
      <div class="bg-blue-600 text-white rounded-2xl p-6 mb-6">
        <p class="text-blue-200 text-sm mb-1">Общая стоимость ремонта</p>
        <p class="text-3xl font-bold mb-4">${fmt(e.grand[0])} — ${fmt(e.grand[1])}</p>
        <div class="grid grid-cols-3 gap-4 text-sm">
          <div><p class="text-blue-200">Работы</p><p class="font-semibold">${fmt(e.totWork[0])} — ${fmt(e.totWork[1])}</p></div>
          <div><p class="text-blue-200">Материалы</p><p class="font-semibold">${fmt(e.totMat[0])} — ${fmt(e.totMat[1])}</p></div>
          <div><p class="text-blue-200">Резерв 10–15%</p><p class="font-semibold">${fmt(e.reserve[0])} — ${fmt(e.reserve[1])}</p></div>
        </div>
      </div>

      <!-- Этапы -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-6 overflow-x-auto">
        <h2 class="text-lg font-bold text-gray-900 mb-4">Разбивка по этапам</h2>
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-50 text-gray-500 text-left">
            <th class="px-4 py-3 font-medium">#</th>
            <th class="px-4 py-3 font-medium">Этап</th>
            <th class="px-4 py-3 font-medium text-right">Работы</th>
            <th class="px-4 py-3 font-medium text-right">Материалы</th>
          </tr></thead>
          <tbody>${stagesHtml}</tbody>
        </table>
      </div>

      <!-- Советы -->
      <h2 class="text-lg font-bold text-gray-900 mb-4">Советы по экономии</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        ${tipCard('🔧','Можно самостоятельно',tips.diy,'bg-green-50 border-green-100','text-green-800')}
        ${tipCard('⚡','Нельзя экономить',tips.noSave,'bg-red-50 border-red-100','text-red-800')}
        ${tipCard('💡','Ошибки новичков',tips.rookie,'bg-yellow-50 border-yellow-100','text-yellow-800')}
      </div>

      <!-- CTA -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 text-center no-print">
        <p class="text-gray-500 text-sm mb-4">Цены актуальны на июнь 2026 г. Смета носит ориентировочный характер.</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors">📄 Распечатать / PDF</button>
          <button onclick="gotoForm()" class="bg-gray-100 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-200 transition-colors">Пересчитать</button>
        </div>
      </div>

    </div>
  </main>`
}

// ─── СОБЫТИЯ ─────────────────────────────────────────────────────────────────

function attachEvents() {}

function gotoLanding() { setState({ screen:'landing', step:0, error:'' }) }
function gotoForm()    { setState({ screen:'form', step:0, error:'' }) }

function setField(key, val) {
  state.form[key] = val
  state.error = ''
  render()
}

function prevStep() { setState({ step: state.step - 1, error:'' }) }

function nextStep() {
  const s = state.step
  const f = state.form
  if (s === 0 && !f.houseType)       { setState({ error:'Выберите тип жилья' }); return }
  if (s === 1) {
    if (!f.area || isNaN(+f.area) || +f.area < 10) { setState({ error:'Укажите площадь (не менее 10 м²)' }); return }
  }
  if (s === 2 && !f.renovationType)  { setState({ error:'Выберите тип ремонта' }); return }
  if (s === 3) {
    if (!f.region) { setState({ error:'Выберите регион' }); return }
    const estimate = calculate({ houseType: f.houseType, area: +f.area, rooms: +f.rooms, bathroomType: f.bathroomType, renovationType: f.renovationType, region: f.region })
    setState({ screen:'result', estimate, error:'' })
    return
  }
  setState({ step: s + 1, error:'' })
}

// ─── СТАРТ ───────────────────────────────────────────────────────────────────

render()
</script>
</body>
</html>
